<div id="full-background-cover" class="flex h-full bg-black items-center justify-center">
    <div id="centered-block" class="bg-gray-200 max-x-sm p-6 rounded-xl shadow-gray-200">
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <h2 class="text-center">Connexion</h2>
            <div id="email-container">
                <mat-form-field>
                    <mat-label>Email</mat-label>
                    <input matInput formControlName="username" type="email" placeholder="xxxx@gmail.com" />
                </mat-form-field>
            </div>
            <div id="password-container">
                <mat-form-field>
                    <mat-label>Password</mat-label>
                    <input matInput type="password" formControlName="password" />
                </mat-form-field>
            </div>
            <button mat-flat-button type="submit" class="w-full">
                <!--mat-flat-button : c'est une directive qui transforme un élément existant-->
                Se connecter
            </button>
        </form>
    </div>
</div>
